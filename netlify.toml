# myAnalyst — Netlify configuration
# Hand-built static site (no build step).
#
# IMPORTANT: skip_processing must stay FALSE. Netlify's deploy-time
# post-processing pass is where automatic Netlify Forms DETECTION happens;
# skip_processing = true would skip it and the form would never be registered.
# We instead turn OFF only the individual transforms we don't want:
#   - pretty_urls: stops Netlify rewriting "pro.html" -> "/pro", which broke the
#     gold "Pro" nav styling (CSS a[href*="pro"]) and JS active-link matching.
#   - css/js bundle+minify: keep our hand-tuned CSS/JS byte-for-byte
#     (minify can break the gradient-clipped "Pro" text effect).
#
# Form detection is OFF BY DEFAULT on Netlify sites created after 2023-04-12 and
# CANNOT be enabled from this file. After deploying, enable it in the Netlify UI:
#   Site -> Forms -> Usage and configuration -> Form detection -> Enable
# then trigger a redeploy. Submissions then appear under Forms ("demo-request").

[build]
  publish = "."

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = false

[build.processing.images]
  compress = false
